<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Photo Gallery - Solapur Tourism</title>
<link rel="stylesheet" href="style.css">

<style>

/* Page heading */
h2{
text-align:center;
margin-top:20px;
}

/* Gallery grid */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

/* Images */

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.gallery img:hover{
transform:scale(1.07);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

<script>

function openImage(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeImage(){
document.getElementById("lightbox").style.display="none";
}

</script>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="places.html">Places</a>
<a href="culture.html">Culture</a>
<a href="travel.html">Travel Guide</a>
<a href="food.html">Food</a>
<a href="gallery.html">Gallery</a>
<a href="enquiry.html">Enquiry</a>
</nav>


<div class="container">

<h2>Solapur Tourism Photo Gallery</h2>

<p style="text-align:center;">
Explore beautiful photographs of famous temples and pilgrimage destinations around Solapur.
</p>

<div class="gallery">

<img src="images/siddeshwar.jpg" alt="Siddheshwar Temple" onclick="openImage(this.src)">
<img src="images/siddeshwar_night.jpg" alt="Siddheshwar Night View" onclick="openImage(this.src)">
<img src="images/pandharpur1.jpg" alt="Pandharpur Temple" onclick="openImage(this.src)">
<img src="images/pandharpur2.jpg" alt="Pandharpur Vitthal Temple" onclick="openImage(this.src)">
<img src="images/tuljapur1.jpg" alt="Tuljapur Temple" onclick="openImage(this.src)">
<img src="images/tuljapur2.jpg" alt="Tulja Bhavani Temple" onclick="openImage(this.src)">
<img src="images/tuljapur3.jpg" alt="Tuljapur Entrance" onclick="openImage(this.src)">

</div>

</div>


<!-- Lightbox viewer -->

<div id="lightbox" class="lightbox" onclick="closeImage()">

<span class="close">&times;</span>

<img id="lightbox-img">

</div>


<footer>
Solapur Tourism Photo Gallery
</footer>

</body>

</html>
